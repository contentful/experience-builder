name: 'Pull Request Labeler'
on: [pull_request]

permissions:
  contents: read # Read repository content
  pull-requests: write # Add/remove labels on PRs

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v4
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
