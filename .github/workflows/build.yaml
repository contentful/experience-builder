name: Build and Test

on:
  workflow_call:
    # secrets:
    #   VAULT_URL:
    #     required: true

permissions:
  contents: read # Checkout code
  actions: write # Save caches

jobs:
  install-build:
    runs-on: ubuntu-latest
    steps:
      - name: "Echo ref_name"
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "$REF_NAME"

      # - name: Retrieve Secrets from Vault
      #   id: vault
      #   uses: hashicorp/vault-action@v3.4.0
      #   with:
      #     url: ${{ secrets.VAULT_URL }}
      #     role: ${{ github.event.repository.name }}-github-action
      #     method: jwt
      #     path: github-actions
      #     exportEnv: false
      #     secrets: |
      #       secret/data/github/github_packages_read GITHUB_PACKAGES_READ_TOKEN | GITHUB_PACKAGES_READ_TOKEN ;
      #       github/token/${{ github.event.repository.name }}-packages-read token | GITHUB_TOKEN ;

      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Checkout all branches and tags, needed for publish
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}
          # token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Use NodeJS 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20.11"
          cache: "npm"
      - name: Restore Cypress Binary
        uses: actions/cache/restore@v4
        id: restore-cypress
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('./package-lock.json') }}
          restore-keys: cypress-${{ runner.os }}-

      - name: Setup npmrc
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          echo "@contentful:registry=https://npm.pkg.github.com" >> .npmrc

      - name: Install dependencies
        run: npm ci
      # cypress binary is installed via postinstall script which is blocked with ignore-scripts=true
      # if missing from cache, we need to run it conditionally before saving binary in cache
      - name: Install cypress dependencies
        if: steps.restore-cypress.outputs.cache-hit != 'true'
        run: npx cypress install
      - name: Save Cypress Binary
        if: steps.restore-cypress.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('./package-lock.json') }}
      - name: Build app
        run: |
          npm run build
      - name: List components folder
        run: ls -la packages/components
      - name: Save Build folders
        uses: actions/cache/save@v4
        with:
          path: |
            packages/*/dist
            packages/*/build
            packages/test-apps/react-vite/dist
            packages/test-apps/nextjs/.next
            packages/templates/nextjs-marketing-demo/.next
            packages/templates/react-vite-ts/dist
          key: build-cache-${{ github.run_id }}-${{ github.run_attempt }}
